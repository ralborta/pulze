name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build bot
        run: pnpm build:bot
      
      - name: Build web
        run: pnpm build:web
      
      - name: Build backoffice
        run: pnpm build:backoffice

  # Requiere en GitHub Secrets: RAILWAY_TOKEN (project token), RAILWAY_PROJECT_ID, RAILWAY_SERVICE_ID
  # O conectar el repo en Railway (Settings → Source → Connect Repo) para deploy automático al hacer push
  deploy-railway:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      
      - name: Deploy to Railway
        run: railway up --service $RAILWAY_SERVICE_ID --detach

  deploy-vercel:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Web to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          working-directory: apps/web
          
      - name: Deploy Backoffice to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_BACKOFFICE_PROJECT_ID }}
          working-directory: apps/backoffice

  # Easypanel: deploy automático al hacer push (opcional).
  # En cada app en Easypanel: copiá la "Deploy Webhook URL" y agregala en GitHub Secrets.
  # Secretos: EASYPANEL_BOT_WEBHOOK, EASYPANEL_WEB_WEBHOOK, EASYPANEL_BACKOFFICE_WEBHOOK
  # O uno solo: EASYPANEL_WEBHOOK_URL. Ver docs/EASYPANEL_DEPLOY.md
  deploy-easypanel:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploys
        env:
          BOT: ${{ secrets.EASYPANEL_BOT_WEBHOOK }}
          WEB: ${{ secrets.EASYPANEL_WEB_WEBHOOK }}
          BACK: ${{ secrets.EASYPANEL_BACKOFFICE_WEBHOOK }}
          ONE: ${{ secrets.EASYPANEL_WEBHOOK_URL }}
        run: |
          for url in "$BOT" "$WEB" "$BACK" "$ONE"; do
            [ -n "$url" ] && curl -sfS -X POST "$url" || true
          done
