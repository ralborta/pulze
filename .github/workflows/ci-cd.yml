name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter @pulze/database exec prisma generate

      - name: Build database package
        run: pnpm build:database

      - name: Build bot
        run: pnpm build:bot

      - name: Build web
        run: pnpm build:web

      - name: Build backoffice
        run: pnpm build:backoffice

  # Producción: solo Easypanel (no Vercel, no Railway).
  # Opción A: Auto Deploy en cada app Easypanel conectada al repo (recomendado).
  # Opción B: webhooks de deploy en GitHub Secrets → docs/EASYPANEL_DEPLOY.md
  deploy-easypanel:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploys
        env:
          BOT: ${{ secrets.EASYPANEL_BOT_WEBHOOK }}
          WEB: ${{ secrets.EASYPANEL_WEB_WEBHOOK }}
          BACK: ${{ secrets.EASYPANEL_BACKOFFICE_WEBHOOK }}
          ONE: ${{ secrets.EASYPANEL_WEBHOOK_URL }}
        run: |
          triggered=0
          for url in "$BOT" "$WEB" "$BACK" "$ONE"; do
            if [ -n "$url" ]; then
              echo "POST $url"
              curl -sfS -X POST "$url" && triggered=$((triggered + 1)) || echo "Webhook falló (revisar URL)"
            fi
          done
          if [ "$triggered" -eq 0 ]; then
            echo "Sin webhooks EASYPANEL_* en GitHub Secrets."
            echo "Usá Auto Deploy en Easypanel o agregá las URLs (ver docs/EASYPANEL_DEPLOY.md)."
          fi
